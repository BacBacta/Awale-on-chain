[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read-write", path = "./test/fixtures" }]
# via_ir + optimizer: the 12-field Match struct returned by getMatch overflows
# the legacy stack-based codegen ("stack too deep"); the IR pipeline handles it.
via_ir = true
optimizer = true
optimizer_runs = 200

# RPC aliases — use `--rpc-url celo_sepolia` (no need to export the env var).
[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo = "https://forno.celo.org"

# Celoscan verification via the Etherscan V2 unified endpoint (one key, multichain).
# The V1 per-explorer endpoints are deprecated. Use an Etherscan V2 API key.
[etherscan]
celo_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11142220, url = "https://api.etherscan.io/v2/api?chainid=11142220" }
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220, url = "https://api.etherscan.io/v2/api?chainid=42220" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
