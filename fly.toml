app = "awale-game-server"
primary_region = "cdg"

[build]
  dockerfile = "packages/game-server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep exactly one machine always running: the tsx cold start (~24s) + resume
  # made the tournament lobby flaky on the first request after idle, which hurts
  # first-impression UX. min=max=1 = one always-warm machine (no cold start),
  # still single-process so in-memory matchmaking/keeper stay correct.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  # keep one machine max — matchmaking is in-memory per process (see memory note)
  max_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
