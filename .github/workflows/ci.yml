name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts — build, test, static analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Regenerate parity vectors and verify they are committed in sync
        run: |
          forge script script/GenVectors.s.sol
          forge script script/GenSigVectors.s.sol
          git diff --exit-code test/fixtures/vectors.json test/fixtures/sig-vectors.json

  slither:
    name: Contracts — Slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high

  engine:
    name: Engine (TypeScript) — typecheck, parity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit + Solidity parity vectors)
        run: npm test

  game-server:
    name: Game server (TypeScript) — typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/game-server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/game-server/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit + EIP-712 parity with contracts)
        run: npm test

  protocol:
    name: Protocol (TypeScript) — typecheck, parity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/protocol
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/protocol/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  indexer:
    name: Indexer (TypeScript) — typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/indexer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/indexer/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  app:
    name: Mini-app (Next.js) — typecheck, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
